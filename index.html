
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grabovoi codes</title>

<style>
    body {
        font-family: -apple-system, Arial, sans-serif;
        text-align: center;
        margin-top: 20px;
        background-color: #f8f9fa;
    }

    /* Message */
    #message {
        font-size: clamp(16px, 4vw, 20px);
        margin-bottom: 10px;
        height: 24px;
        color: #444;
    }

   
/* Numbers */
    #numbers {
        color: black;
        font-size: clamp(24px, 8vw, 60px);
        margin: 15px;
    }

    #numbers span {
        margin: 0 5px;
    }

    /* Controls */
    #controls {
        margin-top: 20px;
        transition: opacity 0.4s ease;
    }

    .hidden {
        opacity: 0;
        pointer-events: none;
    }

    button {
        font-size: clamp(12px, 4vw, 16px);
        padding: clamp(6px, 2vw, 12px);
        margin: 5px;
        border-radius: 12px;
        border: none;
        background-color: #e0e0e0;
        cursor: pointer;
    }

    button:active {
        transform: scale(0.95);
    }

    input {
        font-size: clamp(12px, 4vw, 16px);
        padding: 5px;
        width: 110px;
        text-align: center;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    /* Timer active */
    #timerBtn.active {
        background-color: #34C759;
        color: white;
    }
</style>
</head>

<body>

<h3></h3>

<div id="message"></div>
<div id="numbers"></div>

<div id="controls">
    <button onclick="previous()">⬅️</button>
    <button id="timerBtn" onclick="toggleTimer()">⏱️ Auto</button>
    <button onclick="next()">➡️</button>

    <br><br>

    Duration (ms):
    <input type="number" id="timerInput" value="127.7139208">
</div>

<script>
      const numbers = [514,888 + " " + 88 + " " + 4 + " " + 88 + " " + 88 + " " + 8,918 + " " + 948 + " " + 181,181 + " " + 43 + " " + 21,51 + " " + 86 + " " + 923,519 + " " + 606 + " " + 901 + " " + 319,824 + " " + 06 + " " + 92,396 + " " + 815,918 + " " + 197 + " " + 185,8888 + " " + 9 + " " + 8888 + " " + 78 + " " + 888,498 + " " + 1943 + " " + 1947,148 + " " + 85 + " " + 14,514 + " " + 85 + " " + 84,586 + " " + 20 + " " + 43,210 + " " + 250 + " " + 300,29 + " " + 37 + " " + 853,69 + " " + 7 + " " + 70 + " " + 62 + " " + 58,589 + " " + 32 + " " + 40,99 + " " + 88 + " " + 771,543 + " " + 21 + " " + 893,518 + " " + 5213,8124567,812 + " " + 5432,548 + " " + 45 + " " + 48,145 + " " + 68 + " " + 91,885 + " " + 14 + " " + 64,598 + " " + 6179 + " " + 184 + " " + 91,86 + " " + 86 + " " + 694,57 + " " + 49 + " " + 285];

    let index = 0;
    const displayCount = 1;

    let messageTimeout;
    let timerInterval = null;
    let isTimerRunning = false;
    let hideControlsTimeout;

    // ✅ 7 modern colors (no gradient)
    const colors = [
        "#FF3B30", // red
        "#FF9500", // orange
        "#FFCC00", // yellow
        "#34C759", // green
        "#007AFF", // blue
        "#5856D6", // indigo
        "#AF52DE"  // purple
    ];

    let colorIndex = 0;

    function getMessage(slice) {
 if (slice.includes(514)) return "1 - Rajeunissment";
 if (slice.includes(888 + " " + 88 + " " + 4 + " " + 88 + " " + 88 + " " + 8)) return "2 - Rétablir la santé";
if (slice.includes(918 + " " + 948 + " " + 181)) return "3 - Auto-guérison";
        if (slice.includes(181 + " " + 43 + " " + 21)) return "4 - Santé parfaite";
        if (slice.includes(51 + " " + 86 + " " + 923)) return "5 - Connection à la terre";
 if (slice.includes(519 + " " + 606 + " " + 901 + " " + 319)) return "6 - restauration cutanée";
  if (slice.includes(824 + " " + 06 + " " + 92)) return "7 - Corps de rêve";
  if (slice.includes(396 + " " + 815)) return "8 - Amour de soi";
  if (slice.includes(918 + " " + 197 + " " + 185)) return "9 - Satisfaction";
if (slice.includes(8888 + " " + 9 + " " + 8888 + " " + 78 + " " + 888)) return "10 - Chakras";
if (slice.includes(498 + " " + 1943 + " " + 1947)) return "11 - Cheveux blancs";
if (slice.includes(148 + " " + 85 + " " + 14)) return "12 - Santé des dents général";
if (slice.includes(514 + " " + 85 + " " + 84)) return "13 - Carie dentaire";
if (slice.includes(586 + " " + 20 + " " + 43)) return "14 - Dents saines";
if (slice.includes(210 + " " + 250 + " " + 300)) return "15 - Yeux général";
if (slice.includes(29 + " " + 37 + " " + 853)) return "16 - Vision 20/20";
if (slice.includes(69 + " " + 7 + " " + 70 + " " + 62 + " " + 58)) return "17 - Ventre plat";
if (slice.includes(589 + " " + 32 + " " + 40)) return "18 - Mémoire";
if (slice.includes(99 + " " + 88 + " " + 771)) return "19 - Digestion";
if (slice.includes(543 + " " + 21 + " " + 893)) return "20 - Detox système digestif";
if (slice.includes(518 + " " + 5213)) return "21 - Estomac";
if (slice.includes(8124567)) return "22 - Estomac 1";
if (slice.includes(812 + " " + 5432)) return "23 - Estomac duodenal";
if (slice.includes(548 + " " + 45 + " " + 48)) return "24 - Constipation";
if (slice.includes(145 + " " + 68 + " " + 91)) return "25 - Système reproducteur";
if (slice.includes(885 + " " + 14 + " " + 64)) return "26 - Système reproducteur 1";
if (slice.includes(598 + " " + 6179 + " " + 184 + " " + 91)) return "27 - Libido";
if (slice.includes(86 + " " + 86 + " " + 694)) return "28 - Thyroid";
if (slice.includes(57 + " " + 49 + " " + 285)) return "29 - Poumons";

        return "Numbers displayed";
    }

    function showNumbers() {
        const slice = numbers.slice(index, index + displayCount);
        const numbersDiv = document.getElementById("numbers");

        numbersDiv.innerHTML = "";

        slice.forEach((num) => {
            const span = document.createElement("span");
            span.innerText = num;

            span.style.color = colors[colorIndex];

            numbersDiv.appendChild(span);

            colorIndex = (colorIndex + 1) % colors.length;
        });

        const messageDiv = document.getElementById("message");

        if (isTimerRunning) {
            messageDiv.innerText = "";
        } else {
            messageDiv.innerText = getMessage(slice);

            clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => {
                messageDiv.innerText = "";
            }, 3000);
        }

        if (!isTimerRunning) {
            showControlsTemporarily();
        }
    }

    function next() {
        stopTimer();

        index = (index + displayCount) % numbers.length;
        showNumbers();
    }

    function previous() {
        stopTimer();

        index = (index - displayCount + numbers.length) % numbers.length;
        showNumbers();
    }

    function toggleTimer() {
        const controls = document.getElementById("controls");
        const btn = document.getElementById("timerBtn");

        if (timerInterval) {
            stopTimer();
            showControlsTemporarily();
        } else {
            let timerValue = parseInt(document.getElementById("timerInput").value);

            if (isNaN(timerValue) || timerValue <= 0) {
                timerValue = 5000;
            }

            isTimerRunning = true;

            btn.classList.add("active");
            btn.innerText = "⏸️ Stop";

            controls.classList.add("hidden");

            timerInterval = setInterval(() => {
                index = (index + displayCount) % numbers.length;
                showNumbers();
            }, timerValue);
        }
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        isTimerRunning = false;

        const btn = document.getElementById("timerBtn");
        btn.classList.remove("active");
        btn.innerText = "⏱️ Auto";
    }

    function showControlsTemporarily() {
        const controls = document.getElementById("controls");

        controls.classList.remove("hidden");

        clearTimeout(hideControlsTimeout);

        hideControlsTimeout = setTimeout(() => {
            controls.classList.add("hidden");
        }, 10000);
    }

    // ✅ Tap to show controls anytime
    document.addEventListener("click", showControlsTemporarily);
    document.addEventListener("touchstart", showControlsTemporarily);

    // Init
    showNumbers();
</script>

</body>
</html>
