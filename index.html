
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grabovoi codes</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 30px;
    }

    /* Message */
    #message {
       color: blue;
        font-size: clamp(16px, 4vw, 20px);
        margin-bottom: 10px;
        height: 24px;
    }

    /* Numbers */
    #numbers {
        color: blue;
        font-size: clamp(24px, 8vw, 60px);
        margin: 15px;
    }

    /* Controls */
    #controls {
        margin-top: 30px;
        transition: opacity 0.5s;
    }

    .hidden {
        opacity: 0;
        pointer-events: none;
    }

    button {
        font-size: clamp(12px, 4vw, 16px);
        padding: clamp(6px, 2vw, 12px);
        margin: 5px;
        cursor: pointer;
        border-radius: 10px;
    }

    input {
        font-size: clamp(12px, 4vw, 16px);
        padding: 5px;
        width: 120px;
        text-align: center;
    }

    /* Timer button states */
    #timerBtn {
        background-color: #eee;
    }

    #timerBtn.active {
        background-color: #4CAF50;
        color: white;
    }
</style>
</head>

<body>

<h2></h2>

<div id="message"></div>
<div id="numbers"></div>

<div id="controls">
    <button onclick="previous()">⬅️</button>
    <button id="timerBtn" onclick="toggleTimer()">⏱️ Automatique</button>
    <button onclick="next()">➡️</button>

    <br><br>

    Timer (ms):
    <input type="number" id="timerInput" value="127.7139208">
</div>

<script>
   const numbers = [514,88888488888,918948181,1814321,5186923,519606901319,8240692,396815,918197185,88889888878888,49819431947,1488514,5148584,5862043,210250300,2937853,697706258,5893240,9988771,54321893,5185213,8124567,8125432,5484548,1456891,8851464,598617918491,8686694,5749285,498217218227,8121596];

    let index = 0;
    const displayCount = 1;

    let messageTimeout;
    let timerInterval = null;
    let isTimerRunning = false;
    let hideControlsTimeout;

    function getMessage(slice) {
                     if (slice.includes(514)) return "1 - Rajeunissment";
 if (slice.includes(88888488888)) return "2 - Rétablir la santé";
if (slice.includes(918948181)) return "3 - Auto-guérison";
        if (slice.includes(1814321)) return "4 - Santé parfaite";
        if (slice.includes(5186923)) return "5 - Connection à la terre";
 if (slice.includes(519606901319)) return "6 - restauration cutanée";
  if (slice.includes(8240692)) return "7 - Corps de rêve";
  if (slice.includes(396815)) return "8 - Amour de soi";
  if (slice.includes(918197185)) return "9 - Satisfaction";
if (slice.includes(88889888878888)) return "10 - Chakras";
if (slice.includes(49819431947)) return "11 - Cheveux blancs";
if (slice.includes(1488514)) return "12 - Santé des dents général";
if (slice.includes(5148584)) return "13 - Carie dentaire";
if (slice.includes(5862043)) return "14 - Dents saines";
if (slice.includes(210250300)) return "15 - Yeux général";
if (slice.includes(2937853)) return "16 - Vision 20/20";
if (slice.includes(697706258)) return "17 - Ventre plat";
if (slice.includes(5893240)) return "18 - Mémoire";
if (slice.includes(9988771)) return "19 - Digestion";
if (slice.includes(54321893)) return "20 - Detox système digestif";
if (slice.includes(5185213)) return "21 - Estomac";
if (slice.includes(8124567)) return "22 - Estomac 1";
if (slice.includes(8125432)) return "23 - Estomac duodenal";
if (slice.includes(5484548)) return "24 - Constipation";
if (slice.includes(1456891)) return "25 - Système reproducteur";
if (slice.includes(8851464)) return "26 - Système reproducteur 1";
if (slice.includes(598617918491)) return "27 - Libido";
if (slice.includes(8686694)) return "28 - Thyroid";
if (slice.includes(5749285)) return "29 - Poumons";
if (slice.includes(498217218227)) return "30 - Colonne vertebrale";
if (slice.includes(8121596)) return "31 - Muscles";

        return "Numbers displayed";
    }

    function showNumbers() {
        const slice = numbers.slice(index, index + displayCount);
        document.getElementById("numbers").innerText = slice.join(", ");

        const messageDiv = document.getElementById("message");

        if (isTimerRunning) {
            messageDiv.innerText = "";
        } else {
            messageDiv.innerText = getMessage(slice);

            clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => {
                messageDiv.innerText = "";
            }, 5000);
        }

        if (!isTimerRunning) {
            showControlsTemporarily();
        }
    }

    function next() {
        stopTimer();

        if (index + displayCount < numbers.length) {
            index += displayCount;
        } else {
            index = 0;
        }

        showNumbers();
    }

    function previous() {
        stopTimer();

        if (index - displayCount >= 0) {
            index -= displayCount;
        } else {
            index = numbers.length - displayCount;
        }

        showNumbers();
    }

    function toggleTimer() {
        const controls = document.getElementById("controls");
        const btn = document.getElementById("timerBtn");

        if (timerInterval) {
            // STOP
            stopTimer();
            showControlsTemporarily();
        } else {
            let timerValue = parseInt(document.getElementById("timerInput").value);

            if (isNaN(timerValue) || timerValue <= 0) {
                timerValue = 5000;
            }

            isTimerRunning = true;

            // ✅ Activate button
            btn.classList.add("active");
            btn.innerText = "⏸️ En cours";

            // Hide controls
            controls.classList.add("hidden");

            timerInterval = setInterval(() => {
                if (index + displayCount < numbers.length) {
                    index += displayCount;
                } else {
                    index = 0;
                }

                showNumbers();
            }, timerValue);
        }
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        isTimerRunning = false;

        const btn = document.getElementById("timerBtn");

        // ✅ Reset button
        btn.classList.remove("active");
        btn.innerText = "⏱️ En cours";
    }

    function showControlsTemporarily() {
        const controls = document.getElementById("controls");

        controls.classList.remove("hidden");

        clearTimeout(hideControlsTimeout);

        hideControlsTimeout = setTimeout(() => {
            controls.classList.add("hidden");
        }, 5000);
    }

    // ✅ Always allow showing controls on tap
    document.addEventListener("click", showControlsTemporarily);
    document.addEventListener("touchstart", showControlsTemporarily);

    // Initial display
    showNumbers();
</script>

</body>
</html>
